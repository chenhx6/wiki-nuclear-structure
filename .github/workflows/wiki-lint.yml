name: Wiki lint

on:
  push:
    paths:
      - ".github/workflows/wiki-lint.yml"
      - "knowledge/**"
      - "system/**"
      - "AGENTS.md"
      - "USER_GUIDE.md"
      - "check.md"
      - "profile.md"
  pull_request:
    paths:
      - ".github/workflows/wiki-lint.yml"
      - "knowledge/**"
      - "system/**"
      - "AGENTS.md"
      - "USER_GUIDE.md"
      - "check.md"
      - "profile.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit and repository tests
        run: python -m unittest discover -s system/tests -p "test_*.py" -v

      - name: Lint Wiki
        run: python system/scripts/wiki_lint.py --fail-on error
